<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智生活今網寬頻雙網方案優惠試算</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0f7f7;
            background-image: linear-gradient(135deg, #ffffff 0%, #e0f2f1 100%);
            min-height: 100vh;
            color: #37474f;
            position: relative;
            overflow-x: hidden;
        }
        .tiffany-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(129, 203, 196, 0.15);
            border: 1px solid #ffffff;
            backdrop-filter: blur(10px);
        }
        .tiffany-input {
            background: #ffffff;
            border: 1.5px solid #b2dfdb;
            border-radius: 12px;
            padding: 10px 14px;
            color: #263238;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }
        .tiffany-input::placeholder {
            color: #ef4444 !important;
            opacity: 1;
        }
        .placeholder-style {
            color: #9ca3af !important;
        }
        .tiffany-input:focus {
            border-color: #4db6ac;
            outline: none;
            box-shadow: 0 0 0 3px rgba(77, 182, 172, 0.2);
        }
        .btn-logic {
            background-color: #f1f8f7;
            color: #90a4ae;
            border: 1.5px dashed #b2dfdb;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-logic-active {
            background-color: #4db6ac !important;
            color: #ffffff !important;
            border: 1.5px solid #00897b !important;
            box-shadow: 0 4px 10px rgba(77, 182, 172, 0.3);
            font-weight: 800;
        }
        .btn-line {
            background: linear-gradient(135deg, #4db6ac 0%, #26a69a 100%);
            box-shadow: 0 8px 20px rgba(38, 166, 154, 0.25);
            animation: pulse 2.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .label-text {
            color: #546e7a;
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 4px;
            display: block;
        }
        .warning-box {
            background-color: #fffaf0;
            border: 2px solid #feebc8;
            border-radius: 16px;
        }
        .hidden { display: none; }
        .highlight-super-large {
            color: #e53935;
            font-size: 2.25rem;
            font-weight: 900;
            line-height: 1.2;
            display: block;
            margin-top: 4px;
        }
        .normal-text {
            font-size: 1.1rem;
            font-weight: 800;
            color: #37474f;
            display: block;
        }
        .price-strike {
            text-decoration: line-through;
            color: #94a3b8;
            font-size: 1rem;
            font-weight: 700;
            margin-right: 8px;
        }
        .phone-item {
            border-left: 4px solid #4db6ac;
            background: #ffffff;
        }
        .summary-item {
            padding: 10px 8px;
            border-radius: 8px;
            background: #f1f8f7;
            border-left: 3px solid #81cbd4;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 4px;
        }
        .over-limit-hint {
            color: #ef4444; 
            font-size: 1.25rem; 
            font-weight: 900;
            display: block;
            margin-top: 12px;
            padding: 16px;
            background-color: #fff5f5;
            border-radius: 12px;
            line-height: 1.4;
            border: 2px solid #feb2b2;
            text-align: center;
        }
        #modal-overlay {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 50;
        }
        .modal-content {
            max-width: 90%;
            width: 360px;
        }
        .btn-info {
            background: #e0f2f1;
            color: #00796b;
            border: 1px solid #b2dfdb;
            font-size: 11px;
            padding: 3px 6px;
            border-radius: 4px;
            font-weight: 900;
            cursor: pointer;
            margin-left: 4px;
            display: inline-block;
            white-space: nowrap;
        }
    </style>
</head>
<body class="py-10 px-4">

    <!-- 方案詳細內容彈窗 -->
    <div id="modal-overlay" class="fixed inset-0 hidden flex items-center justify-center p-4">
        <div class="modal-content bg-white rounded-3xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
            <div id="modal-header" class="p-4 text-white text-center font-black text-lg">
                方案詳細內容
            </div>
            <div class="p-5 space-y-4">
                <div>
                    <div class="text-[11px] font-black text-gray-400 mb-1">行動網路專案內容</div>
                    <div id="modal-net-desc" class="text-sm font-bold text-gray-700 bg-gray-50 p-3 rounded-xl border border-gray-100 whitespace-pre-line"></div>
                </div>
                <div>
                    <div class="text-[11px] font-black text-gray-400 mb-1">免費語音通話</div>
                    <div id="modal-voice-desc" class="text-sm font-bold text-gray-700 bg-gray-50 p-3 rounded-xl border border-gray-100 whitespace-pre-line"></div>
                </div>
                <div id="modal-prepay-container" class="hidden">
                    <div class="text-[11px] font-black text-gray-400 mb-1">預繳金</div>
                    <div id="modal-prepay-desc" class="text-sm font-bold text-gray-700 bg-gray-50 p-3 rounded-xl border border-gray-100 whitespace-pre-line"></div>
                </div>
                <button onclick="closeModal()" class="w-full py-3 bg-gray-100 text-gray-600 font-black rounded-xl hover:bg-gray-200 transition-colors">關閉視窗</button>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto relative z-10">
        <div class="text-center mb-8 pt-4">
            <h1 class="text-3xl font-black tracking-tighter mb-2 text-[#00796b]">智生活今網寬頻</h1>
            <p class="text-lg font-bold text-[#4db6ac]">雙網方案優惠試算</p>
            <div class="h-1.5 w-16 bg-[#81cbd4] mx-auto rounded-full mt-4"></div>
        </div>

        <div class="tiffany-card p-6 mb-6 space-y-4">
            <div>
                <label class="label-text">1. 今網寬頻網路合約狀態</label>
                <select id="user-type" class="tiffany-input w-full appearance-none placeholder-style" onchange="handleSelectColor(event); handleUserTypeChange()">
                    <option value="" disabled selected>請選擇...</option>
                    <option value="new_customer">三個月內新申裝</option>
                    <option value="old_customer">已經是今網用戶</option>
                </select>
            </div>
            <div id="expiry-box" class="hidden">
                <label class="label-text">1-2. 合約到期狀態</label>
                <select id="expiry-status" class="tiffany-input w-full appearance-none placeholder-style" onchange="handleSelectColor(event); calculateAll()">
                    <option value="" disabled selected>請選擇...</option>
                    <option value="short">今網三個月內即將到期</option>
                    <option value="long">今網到期日大於三個月</option>
                </select>
            </div>
        </div>

        <div id="phone-list" class="space-y-4 mb-6"></div>

        <button onclick="addPhone()" class="w-full py-4 mb-8 border-2 border-dashed border-[#4db6ac] rounded-2xl text-[#00796b] font-bold flex items-center justify-center gap-2 bg-white/50 hover:bg-teal-50 transition-colors">
            <span class="text-xl">+</span> 新增另一個門號
        </button>

        <div class="tiffany-card p-7 result-panel shadow-lg mb-10">
            <h2 class="text-xl font-bold mb-6 flex items-center text-[#00796b]"><span class="mr-2">✦</span> 總計試算結果</h2>
            <div class="space-y-6">
                <div class="py-4 border-b border-[#e0f2f1]">
                    <p class="text-[11px] text-[#4db6ac] font-bold uppercase mb-3 tracking-widest">各門號優惠明細</p>
                    <div id="res-summary-list" class="space-y-3"></div>
                </div>
                <div>
                    <p class="text-[11px] text-[#4db6ac] font-bold uppercase mb-2 tracking-widest">總計專屬優惠內容</p>
                    <div id="res-total-discount" class="leading-relaxed min-h-[80px]"></div>
                </div>
                <div class="warning-box p-4 space-y-2">
                    <p class="text-[13px] text-[#c05621] font-bold leading-relaxed">※ 說明1：多門號優惠可完全疊加！各門號優惠內容將於試算結果中詳列。</p>
                    <p class="text-[13px] text-[#c05621] font-bold leading-relaxed">※ 說明2：因雙網方案情境不同優惠可能有所變化，完整優惠仍需由電信專員說明最準確喔！</p>
                </div>
                <a href="https://lin.ee/CPfNPRt" target="_blank" class="btn-line w-full flex flex-col items-center justify-center py-5 rounded-2xl text-white no-underline px-4 text-center">
                    <span class="text-xl font-black mb-1">立即加line找服務專員</span>
                    <span class="text-xs font-bold opacity-90">智生活專屬服務，立即領取隱藏福利</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        const assetInfo = {
            '中華': {
                599: { net: '5G行動 24GB\n到量後4G 12M吃到飽', voice: '網內每通前5分鐘\n網外30分鐘\n市話40分鐘', prepay: '$3,500 (抵扣每月月租費扣到完)' },
                699: { net: '4G行動 吃到飽', voice: '網內每通前10分鐘/網內45分鐘\n網外40分鐘\n市話15分鐘', prepay: '$3,500 (抵扣每月月租費扣到完)' },
                799: { net: '5G行動 36GB\n到量後4G 21M吃到飽', voice: '網內每通前10分鐘\n網外45分鐘\n市話60分鐘', prepay: '$6,000 (抵扣每月月租費扣到完)' },
                999: { net: '5G行動 60GB\n到量後4G 上傳20M/下載50M', voice: '網內免費\n網外60分鐘\n市話75分鐘', prepay: '$8,500 (抵扣每月月租費扣到完)' },
                1399: { net: '5G行動 吃到飽', voice: '網內免費\n網外110分鐘\n市話140分鐘', prepay: '$13,000 (抵扣每月月租費扣到完)' }
            },
            '遠傳': {
                399: { net: '4G行動 6.3GB\n到量後網速128kbs', voice: '網內免費\n網外20分鐘' },
                599: { net: '5G行動 24GB\n到量後4G 12M吃到飽', voice: '網內免費\n網外60分鐘' },
                799: { net: '5G行動 36GB\n到量後4G 21M吃到飽', voice: '網內免費\n網外90分鐘' },
                999: { net: '5G行動 60GB\n到量後4G 50M吃到飽', voice: '網內免費\n網外120分鐘' },
                1399: { net: '5G行動 吃到飽', voice: '網內免費\n網外220分鐘' }
            }
        };

        const planData = {
            'discount': { 
                'np': [
                    { brand: '遠傳', price: 399, reward: 1500, isMonth: false },
                    { brand: '遠傳', price: 599, reward: 3500, isMonth: false },
                    { brand: '遠傳', price: 799, reward: 6000, isMonth: false },
                    { brand: '遠傳', price: 999, reward: 24, isMonth: true },
                    { brand: '遠傳', price: 1399, reward: 30, extra: '+分離式冷氣清洗一台', isMonth: true },
                    { brand: '中華', price: 599, reward: 3000, isMonth: false },
                    { brand: '中華', price: 699, reward: 1500, isMonth: false },
                    { brand: '中華', price: 799, reward: 6000, isMonth: false },
                    { brand: '中華', price: 999, reward: 24, isMonth: true },
                    { brand: '中華', price: 1399, reward: 30, extra: '+分離式冷氣清洗一台', isMonth: true }
                ],
                'new': [
                    { brand: '遠傳', price: 399, reward: 1000, isMonth: false },
                    { brand: '遠傳', price: 599, reward: 3000, isMonth: false },
                    { brand: '遠傳', price: 799, reward: 5000, isMonth: false },
                    { brand: '遠傳', price: 999, reward: 7000, isMonth: false },
                    { brand: '遠傳', price: 1399, reward: 30, extra: '+分離式冷氣清洗一台', isMonth: true },
                    { brand: '中華', price: 599, reward: 2500, isMonth: false },
                    { brand: '中華', price: 699, reward: 1000, isMonth: false },
                    { brand: '中華', price: 799, reward: 5000, isMonth: false },
                    { brand: '中華', price: 999, reward: 7000, isMonth: false },
                    { brand: '中華', price: 1399, reward: 30, isMonth: true }
                ]
            },
            'months': { 
                'np': [
                    { brand: '遠傳', price: 399, reward: 4, isMonth: true },
                    { brand: '遠傳', price: 599, reward: 9, isMonth: true },
                    { brand: '遠傳', price: 799, reward: 16, isMonth: true },
                    { brand: '遠傳', price: 999, reward: 24, isMonth: true },
                    { brand: '遠傳', price: 1399, reward: 30, extra: '+分離式冷氣清洗一台', isMonth: true },
                    { brand: '中華', price: 599, reward: 8, isMonth: true },
                    { brand: '中華', price: 699, reward: 4, isMonth: true },
                    { brand: '中華', price: 799, reward: 16, isMonth: true },
                    { brand: '中華', price: 999, reward: 24, isMonth: true },
                    { brand: '中華', price: 1399, reward: 30, extra: '+分離式冷氣清洗一台', isMonth: true }
                ],
                'new': [
                    { brand: '遠傳', price: 399, reward: 3, isMonth: true },
                    { brand: '遠傳', price: 599, reward: 8, isMonth: true },
                    { brand: '遠傳', price: 799, reward: 13, isMonth: true },
                    { brand: '遠傳', price: 999, reward: 19, isMonth: true },
                    { brand: '遠傳', price: 1399, reward: 30, isMonth: true },
                    { brand: '中華', price: 599, reward: 6, isMonth: true },
                    { brand: '中華', price: 699, reward: 3, isMonth: true },
                    { brand: '中華', price: 799, reward: 13, isMonth: true },
                    { brand: '中華', price: 999, reward: 19, isMonth: true },
                    { brand: '中華', price: 1399, reward: 30, extra: '+分離式冷氣清洗一台', isMonth: true }
                ]
            }
        };

        function showPlanDetails(brand, price) {
            const data = assetInfo[brand]?.[price];
            if (!data) return;
            const overlay = document.getElementById('modal-overlay');
            const header = document.getElementById('modal-header');
            const prepayContainer = document.getElementById('modal-prepay-container');
            
            header.textContent = `${brand} ${price}型 方案詳情`;
            header.style.backgroundColor = brand === '中華' ? '#673ab7' : '#e53935';
            document.getElementById('modal-net-desc').innerText = data.net;
            document.getElementById('modal-voice-desc').innerText = data.voice;
            
            if (brand === '中華' && data.prepay) {
                document.getElementById('modal-prepay-desc').innerText = data.prepay;
                prepayContainer.classList.remove('hidden');
            } else {
                prepayContainer.classList.add('hidden');
            }
            overlay.classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
        function handleSelectColor(e) { e.target.classList.toggle('placeholder-style', !e.target.value); }
        function handleUserTypeChange() {
            const ut = document.getElementById('user-type').value;
            document.getElementById('expiry-box').classList.toggle('hidden', ut !== 'old_customer');
            updateAllPlanOptions(); calculateAll();
        }

        function addPhone() {
            const id = 'phone-' + Date.now();
            const container = document.getElementById('phone-list');
            const div = document.createElement('div');
            div.id = id; div.className = 'phone-item p-5 rounded-2xl shadow-sm space-y-4 relative';
            div.dataset.applyType = 'np'; div.dataset.npMethod = 'auto'; div.dataset.targetBrand = '';
            div.innerHTML = `
                <div class="flex items-center gap-y-1 mb-1">
                    <span class="bg-teal-100 text-teal-700 px-3 py-1 rounded-full text-xs font-black italic">門號 #${container.children.length + 1}</span>
                    ${container.children.length > 0 ? `<button onclick="removePhone('${id}')" class="ml-auto text-gray-400 text-xs font-bold hover:text-red-500">移除 ×</button>` : ''}
                </div>
                <div>
                    <label class="label-text">2. 您目前的電信門號</label>
                    <select class="tiffany-input w-full current-telco placeholder-style" onchange="handleSelectColor(event); updatePhoneLogic('${id}')">
                        <option value="" disabled selected>請選擇...</option>
                        <option value="cht">中華電信</option><option value="fet">遠傳電信</option><option value="twn">台灣大哥大</option>
                    </select>
                </div>
                <div>
                    <label class="label-text">3. 辦理類別</label>
                    <div class="flex flex-col gap-2">
                        <button class="flex-1 py-3 rounded-lg text-[11px] font-bold btn-logic btn-logic-active btn-type-np" onclick="setPhoneApplyType('${id}', 'np')">攜碼 (改電信)</button>
                        <button class="flex-1 py-3 rounded-lg text-[11px] font-bold btn-logic btn-type-new" onclick="setPhoneApplyType('${id}', 'new')">新辦門號</button>
                    </div>
                </div>
                <div class="target-brand-selection-box hidden space-y-3">
                    <label class="label-text">想了解哪家電信？</label>
                    <div class="flex gap-2">
                        <button class="flex-1 py-3 rounded-xl text-[11px] font-bold btn-logic btn-target-cht" onclick="setTargetBrand('${id}', '中華')">中華電信</button>
                        <button class="flex-1 py-3 rounded-xl text-[11px] font-bold btn-logic btn-target-fet" onclick="setTargetBrand('${id}', '遠傳')">遠傳電信</button>
                    </div>
                </div>
                <div class="np-method-container hidden space-y-3">
                    <label class="label-text">4. 選擇優惠方式</label>
                    <div class="flex gap-2">
                        <button class="flex-1 py-3 rounded-xl text-[10px] font-bold btn-logic btn-logic-active btn-method-auto" onclick="setNpMethod('${id}', 'auto')">比照現有資費</button>
                        <button class="flex-1 py-3 rounded-xl text-[10px] font-bold btn-logic btn-method-manual" onclick="setNpMethod('${id}', 'manual')">了解其他資費</button>
                    </div>
                    <div class="auto-input-box p-3 bg-teal-50 rounded-lg">
                        <input type="number" class="tiffany-input w-full current-price-input" placeholder="目前的資費，如：599" oninput="calculateAll()">
                    </div>
                </div>
                <div class="manual-container hidden">
                    <select class="tiffany-input w-full plan-select placeholder-style" onchange="handleSelectColor(event); calculateAll()">
                        <option value="" disabled selected>請選擇方案...</option>
                    </select>
                </div>
            `;
            container.appendChild(div); updatePhoneLogic(id);
        }

        function removePhone(id) { document.getElementById(id).remove(); calculateAll(); }
        function setPhoneApplyType(id, type) {
            const el = document.getElementById(id); el.dataset.applyType = type;
            el.querySelector('.btn-type-np').classList.toggle('btn-logic-active', type === 'np');
            el.querySelector('.btn-type-new').classList.toggle('btn-logic-active', type === 'new');
            updatePhoneLogic(id);
        }
        function setNpMethod(id, method) {
            const el = document.getElementById(id); el.dataset.npMethod = method;
            el.querySelector('.btn-method-auto').classList.toggle('btn-logic-active', method === 'auto');
            el.querySelector('.btn-method-manual').classList.toggle('btn-logic-active', method === 'manual');
            updatePhoneLogic(id);
        }
        function setTargetBrand(id, brand) {
            const el = document.getElementById(id); el.dataset.targetBrand = brand;
            el.querySelector('.btn-target-cht').classList.toggle('btn-logic-active', brand === '中華');
            el.querySelector('.btn-target-fet').classList.toggle('btn-logic-active', brand === '遠傳');
            updatePhoneLogic(id);
        }

        function updatePhoneLogic(id) {
            const el = document.getElementById(id);
            const curTelco = el.querySelector('.current-telco').value;
            const applyType = el.dataset.applyType;
            if (applyType === 'np') {
                if (curTelco === 'cht') el.dataset.targetBrand = '遠傳';
                else if (curTelco === 'fet') el.dataset.targetBrand = '中華';
                el.querySelector('.target-brand-selection-box').classList.toggle('hidden', curTelco !== 'twn');
                el.querySelector('.np-method-container').classList.toggle('hidden', !el.dataset.targetBrand);
            } else {
                el.querySelector('.target-brand-selection-box').classList.remove('hidden');
            }
            el.querySelector('.manual-container').classList.toggle('hidden', !el.dataset.targetBrand || (applyType==='np' && el.dataset.npMethod==='auto'));
            updatePlanOptions(id); calculateAll();
        }

        function updateAllPlanOptions() { document.querySelectorAll('.phone-item').forEach(i => updatePlanOptions(i.id)); }
        function updatePlanOptions(id) {
            const el = document.getElementById(id); const userType = document.getElementById('user-type').value;
            const brand = el.dataset.targetBrand; const applyType = el.dataset.applyType;
            const select = el.querySelector('.plan-select');
            if (!brand || !userType) return;
            const plans = planData['discount'][applyType].filter(p => p.brand === brand);
            select.innerHTML = '<option value="" disabled selected>請選擇...</option>';
            plans.forEach(p => {
                const opt = document.createElement('option'); opt.value = JSON.stringify(p);
                opt.textContent = `${p.brand} ${p.price}型`; select.appendChild(opt);
            });
        }

        function calculateAll() {
            const userType = document.getElementById('user-type').value;
            const expiryStatus = document.getElementById('expiry-status').value;
            const phoneItems = document.querySelectorAll('.phone-item');
            const summaryList = document.getElementById('res-summary-list');
            const totalContainer = document.getElementById('res-total-discount');
            summaryList.innerHTML = '';
            if (!userType || (userType === 'old_customer' && !expiryStatus)) {
                totalContainer.innerHTML = '<p class="text-gray-400 font-bold italic">請選擇寬頻合約狀態</p>'; return;
            }

            let validPlans = [];
            phoneItems.forEach((item, i) => {
                const applyType = item.dataset.applyType; const targetBrand = item.dataset.targetBrand;
                const npMethod = item.dataset.npMethod;
                let price = (applyType === 'np' && npMethod === 'auto') ? (parseInt(item.querySelector('.current-price-input').value) || 0) : 0;
                if (!price) { const s = item.querySelector('.plan-select').value; if(s) price = JSON.parse(s).price; }
                if (price && targetBrand) {
                    const listA = planData['discount'][applyType].filter(p => p.brand === targetBrand).sort((a,b)=>a.price-b.price);
                    const listB = planData['months'][applyType].filter(p => p.brand === targetBrand).sort((a,b)=>a.price-b.price);
                    const planA = listA.find(p => p.price >= price) || listA[listA.length-1];
                    const planB = listB.find(p => p.price >= price) || listB[listB.length-1];
                    validPlans.push({ index: i+1, brand: targetBrand, applyType, price: planA.price, planA, planB });
                }
            });

            if (validPlans.length === 0) {
                totalContainer.innerHTML = '<p class="text-gray-400 font-bold italic">請填寫門號資訊</p>'; return;
            }

            const isLong = (userType === 'old_customer' && expiryStatus === 'long');
            const hasMix = validPlans.length > 1 && (new Set(validPlans.map(p => p.planA.isMonth))).size > 1;

            const render = (mode) => {
                let html = ''; let totalReward = 0; let totalMonths = 0; let extras = [];
                validPlans.forEach(p => {
                    let displayLabel = "";
                    if (hasMix) { 
                        displayLabel = `贈${p.planB.reward}個月`; totalMonths += p.planB.reward;
                    } else {
                        if (p[mode].isMonth) { displayLabel = `贈${p[mode].reward}個月`; totalMonths += p[mode].reward; }
                        else { displayLabel = `折${p[mode].reward}元`; totalReward += p[mode].reward; }
                    }
                    if (p[mode].extra) extras.push(p[mode].extra.replace('+',''));
                    if (mode === 'planA') {
                        const div = document.createElement('div'); div.className = 'summary-item';
                        div.innerHTML = `
                            <div class="text-[12px] font-bold">#${p.index} ${p.applyType==='np'?'攜碼':'新辦'}${p.brand}${p.price}型 
                                <button onclick="showPlanDetails('${p.brand}', ${p.price})" class="btn-info">此方案了解更多</button>
                            </div>
                            <div class="text-[11px] font-black text-[#e53935]">${isLong ? '方案A/B擇一' : displayLabel}</div>
                        `;
                        summaryList.appendChild(div);
                    }
                });

                if (hasMix) html += `<div><span class="normal-text">總計贈送網路</span><span class="highlight-super-large">${totalMonths}個月</span></div>`;
                else {
                    if (totalReward > 0) html += `<div><span class="normal-text">網路資費現折</span><span class="highlight-super-large">${totalReward}元</span></div>`;
                    if (totalMonths > 0) html += `<div><span class="normal-text">總計贈送網路</span><span class="highlight-super-large">${totalMonths}個月</span></div>`;
                }
                if (extras.length) html += `<div class="mt-2 text-[#00897b] font-black">加贈：${[...new Set(extras)].join('、')}</div>`;
                return html;
            };

            totalContainer.innerHTML = isLong ? 
                `<div class="space-y-4">
                    <div class="p-3 bg-white rounded-xl border">A：${render('planA')}</div>
                    <div class="p-3 bg-white rounded-xl border">B：${render('planB')}</div>
                </div>` : render('planA');
        }

        window.onload = addPhone;
    </script>
</body>
</html>
