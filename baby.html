<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Hardy & Ted 成長獎勵看板</title>
<style>
:root {
  --hardy-main: #2563EB; 
  --hardy-bg: #DBEAFE;
  --ted-main: #059669;   
  --ted-bg: #D1FAE5;
  --bg-main: #F8FAFC;
  --card-bg: #FFFFFF;
  --text-dark: #0F172A;
  --text-muted: #64748B;
  --accent-warm: #F59E0B;
  --radius-lg: 24px;
  --radius-md: 12px;
  --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
body { 
    background: var(--bg-main); 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text-dark);
    line-height: 1.5;
    margin: 0;
    padding-bottom: env(safe-area-inset-bottom);
}

.app { max-width: 850px; margin: 0 auto; min-height: 100vh; background: var(--bg-main); position: relative; }

/* Header */
.header {
    background: var(--card-bg);
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    position: sticky;
    top: 0;
    z-index: 50;
}
.week-ctrl {
    display: flex;
    align-items: center;
    background: #F1F5F9;
    padding: 6px 14px;
    border-radius: 24px;
    gap: 12px;
}
.nav-btn {
    border: none; background: none; font-size: 20px; color: var(--text-dark); cursor: pointer; font-weight: bold;
}
.week-label { font-size: 14px; font-weight: 800; }

.edit-trigger {
    background: #F1F5F9; border: none; padding: 8px 12px; border-radius: 12px;
    font-size: 13px; font-weight: 800; cursor: pointer; color: var(--text-dark);
    display: flex; align-items: center; gap: 4px;
}

.tabs {
    display: flex;
    padding: 12px 20px;
    gap: 10px;
}
.tab-btn {
    flex: 1; padding: 12px; border-radius: var(--radius-md); border: none;
    background: #E2E8F0; color: var(--text-muted); font-weight: 700; cursor: pointer;
    transition: all 0.2s;
}
.tab-btn.active { background: var(--text-dark); color: white; box-shadow: var(--shadow); }

/* Person Row: Box + Dashboard Chart */
.person-row {
    display: flex;
    flex-wrap: wrap;
    padding: 0 20px;
    gap: 16px;
    margin-bottom: 24px;
}

/* Overview Stats Card */
.ov-card {
    flex: 0 0 200px;
    border-radius: var(--radius-lg); padding: 18px; box-shadow: var(--shadow);
    border: 2px solid transparent; transition: transform 0.2s;
    cursor: pointer;
}
.ov-card.hardy { background: var(--hardy-bg); border-color: var(--hardy-main); }
.ov-card.ted { background: var(--ted-bg); border-color: var(--ted-main); }

.ov-name { font-size: 18px; font-weight: 900; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.ov-total { font-size: 28px; font-weight: 900; line-height: 1; margin-bottom: 4px; }
.ov-formula { font-size: 10px; font-weight: 600; opacity: 0.7; }
.ov-rem-box { background: rgba(255,255,255,0.6); padding: 8px 10px; border-radius: 12px; margin-top: 10px; }
.ov-rem-label { font-size: 13px; font-weight: 800; display: block; }
.ov-rem-sub { font-size: 9px; font-weight: 600; opacity: 0.6; display: block; }

/* Dashboard Chart Section */
.dashboard-section {
    flex: 1;
    background: white;
    border-radius: var(--radius-lg);
    padding: 18px;
    box-shadow: var(--shadow);
    min-width: 320px;
}
.dash-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
    border-left: 4px solid var(--text-dark);
    padding-left: 10px;
}
.dash-title { font-weight: 900; font-size: 15px; }

.dash-grid {
    display: flex;
    justify-content: space-between;
    height: 130px; 
    align-items: flex-end;
    margin-bottom: 5px;
}
.dash-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
}

.dash-bar-track {
    width: 24px;
    height: 80px;
    background: #F1F5F9;
    border-radius: 12px;
    position: relative;
    overflow: hidden;
    margin-bottom: 8px; 
}
.dash-bar-fill {
    position: absolute;
    bottom: 0;
    width: 100%;
    transition: height 0.5s ease-out;
    border-radius: 12px;
}
.dash-bar-fill.normal-a { background: var(--hardy-main); }
.dash-bar-fill.normal-b { background: var(--ted-main); }
.dash-bar-fill.excellent { background: linear-gradient(to top, #F59E0B, #FCD34D); }

.dash-label { font-size: 10px; font-weight: 800; color: var(--text-muted); }
.dash-pct { font-size: 10px; font-weight: 900; color: var(--text-dark); margin-top: 2px; }
.dash-star { font-size: 12px; height: 14px; margin-top: 2px; }

/* Detail Elements */
.child-selector { display: flex; padding: 0 20px 16px; gap: 8px; }
.child-btn {
    flex: 1; padding: 16px; border-radius: var(--radius-md); border: 2px solid #E2E8F0;
    background: white; font-weight: 800; color: var(--text-muted); cursor: pointer;
    font-size: 16px;
}
.child-btn.on-a { background: var(--hardy-bg); color: var(--hardy-main); border-color: var(--hardy-main); }
.child-btn.on-b { background: var(--ted-bg); color: var(--ted-main); border-color: var(--ted-main); }

.reward-banner {
    margin: 0 20px 20px; padding: 24px; border-radius: 24px;
    background: #1E293B; color: white; text-align: center; box-shadow: var(--shadow);
}
.time-val { font-size: 52px; font-weight: 900; color: var(--accent-warm); }

.day-group { background: white; margin: 0 20px 16px; border-radius: var(--radius-lg); padding: 18px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
.day-head { font-weight: 800; font-size: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #F1F5F9; padding-bottom: 10px; }

.task-section-label { 
    font-size: 13px; font-weight: 900; color: var(--text-muted); 
    margin: 15px 0 8px; padding-left: 4px; display: flex; align-items: center; gap: 6px;
}
.task-item {
    display: flex; align-items: center; padding: 12px 14px; border-radius: 12px; background: #F8FAFC; margin-bottom: 8px; cursor: pointer;
}
.task-item.done-a { background: var(--hardy-bg); color: var(--hardy-main); }
.task-item.done-b { background: var(--ted-bg); color: var(--ted-main); }
.check-box { 
    width: 24px; height: 24px; border-radius: 8px; border: 2px solid #CBD5E1; 
    margin-right: 12px; background: white; display: flex; align-items: center; justify-content: center; font-weight: bold;
}
.done-a .check-box { background: var(--hardy-main); border-color: var(--hardy-main); color: white; }
.done-b .check-box { background: var(--ted-main); border-color: var(--ted-main); color: white; }

/* Modal Editor */
#modal-mask {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5);
    display: none; justify-content: center; align-items: center; z-index: 100;
}
.modal-body {
    background: white; width: 90%; max-width: 450px; border-radius: var(--radius-lg);
    padding: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
}
.modal-title { font-size: 18px; font-weight: 900; margin-bottom: 16px; }
.modal-field { margin-bottom: 16px; }
.modal-field label { display: block; font-size: 12px; font-weight: 800; color: var(--text-muted); margin-bottom: 6px; }
.modal-field textarea {
    width: 100%; border: 1px solid #E2E8F0; border-radius: 12px; padding: 12px; font-size: 14px; min-height: 100px;
    resize: none;
}
.modal-footer { display: flex; gap: 10px; margin-top: 20px; }
.modal-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }
.btn-save { background: var(--text-dark); color: white; }
.btn-cancel { background: #E2E8F0; color: var(--text-muted); }

.action-card {
    background: #F8FAFC; border: 2px solid #E2E8F0; border-radius: var(--radius-lg); padding: 18px; margin: 0 20px 16px;
}
.counter-box { display: flex; justify-content: space-between; align-items: center; }
.counter-ctrl { display: flex; align-items: center; gap: 15px; }

.bonus-tag {
    display: flex; align-items: center; padding: 10px 14px; border-radius: 14px; margin-bottom: 8px; font-size: 12px; font-weight: 700;
}
.bonus-tag .name-badge { padding: 3px 8px; border-radius: 8px; color: white; font-size: 10px; margin-right: 10px; font-weight: 900; }
.bonus-tag.hardy { background: var(--hardy-bg); color: var(--hardy-main); }
.bonus-tag.hardy .name-badge { background: var(--hardy-main); }
.bonus-tag.ted { background: var(--ted-bg); color: var(--ted-main); }
.bonus-tag.ted .name-badge { background: var(--ted-main); }
.bonus-tag .reason { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bonus-tag .points { font-weight: 900; margin-left: 10px; font-size: 14px; }

@media (max-width: 650px) {
    .ov-card { flex: 1 1 100%; }
}

</style>
</head>
<body>

<div class="app">
    <header class="header">
        <div class="week-ctrl">
            <button class="nav-btn" onclick="adjWk(-1)">‹</button>
            <span class="week-label" id="wkLbl">載入中</span>
            <button class="nav-btn" onclick="adjWk(1)">›</button>
        </div>
        <button class="edit-trigger" onclick="openEditor()">⚙️ 任務設定</button>
    </header>

    <div class="tabs">
        <button class="tab-btn active" id="tab-ov" onclick="goView('ov')">數據總覽</button>
        <button class="tab-btn" id="tab-dt" onclick="goView('dt')">詳細任務</button>
    </div>

    <div id="ov-panel"></div>
    <div id="dt-panel" style="display:none"></div>

    <!-- 任務編輯彈窗 -->
    <div id="modal-mask">
        <div class="modal-body">
            <div class="modal-title">🔧 編輯任務內容</div>
            <div class="modal-field">
                <label>☀️ 日間任務 (每行一項)</label>
                <textarea id="edit-dtasks"></textarea>
            </div>
            <div class="modal-field">
                <label>🌙 夜間任務 (每行一項)</label>
                <textarea id="edit-ntasks"></textarea>
            </div>
            <div style="font-size:10px; color:red; margin-bottom:10px">※ 注意：刪除或修改舊任務會導致該任務完成紀錄清除</div>
            <div class="modal-footer">
                <button class="modal-btn btn-cancel" onclick="closeEditor()">取消</button>
                <button class="modal-btn btn-save" onclick="saveTasks()">儲存變更</button>
            </div>
        </div>
    </div>
</div>

<script>
const CH = [{id:'a', name:'Hardy', icon:'👦🏻'}, {id:'b', name:'Ted', icon:'👦🏼'}];
const DAYS = ['一', '二', '三', '四', '五', '六', '日'];

// 預設任務
const DEFAULT_DTASKS = [
    {id:'wake', l:'準時起床 ⏰'}, {id:'dishes', l:'洗碗 🥣'}, {id:'water', l:'裝水 💧'},
    {id:'lunchbox', l:'收餐盒 🍱'}, {id:'report', l:'到校回報 📱'}, {id:'med', l:'吃藥/保健品 💊'}
];
const DEFAULT_NTASKS = [
    {id:'eat', l:'好好吃飯 🥗'}, {id:'litter', l:'清貓砂 🐈'},
    {id:'bowl', l:'洗餐碗 🧼'}, {id:'brush', l:'20:30前刷牙 🪥'}, {id:'sleep', l:'21:00睡覺 🌙'}
];

let wkOff = 0, aCh = 'a', D = {}, config = { dtasks: DEFAULT_DTASKS, ntasks: DEFAULT_NTASKS };

function localSave(){ 
    localStorage.setItem('kids_dashboard_rollback_v2', JSON.stringify({D, config})); 
}
function localLoad(){ 
    const saved = JSON.parse(localStorage.getItem('kids_dashboard_rollback_v2') || '{}');
    if(saved.D) D = saved.D;
    if(saved.config) config = saved.config;
}

function ensure(wk, cid){
    if(!D[wk]) D[wk]={};
    if(!D[wk][cid]) D[wk][cid]={days:{}, bonus:0, used:0, note:''};
}

function getT(wk, cid, di, tid){ return D?.[wk]?.[cid]?.days?.[di]?.[tid] === true; }

function togT(wk, cid, di, tid) {
    const cur = getT(wk, cid, di, tid);
    ensure(wk, cid); 
    if(!D[wk][cid].days[di]) D[wk][cid].days[di]={}; 
    D[wk][cid].days[di][tid]=!cur; 
    localSave(); 
    render(); 
}

function getCompletionStatus(wk, cid, di) {
    ensure(wk, cid);
    const dayData = D[wk][cid].days[di] || {};
    const bonus = D[wk][cid].bonus || 0;
    const dayDone = config.dtasks.length > 0 && config.dtasks.every(t => dayData[t.id] === true);
    const nightDone = config.ntasks.length > 0 && config.ntasks.every(t => dayData[t.id] === true);
    
    let basePercent = 0;
    if (dayDone) basePercent += 50;
    if (nightDone) basePercent += 50;
    
    // 加分邏輯：必須兩邊都全勤才有加分
    let extra = (dayDone && nightDone) ? (bonus * 10) : 0;
    return basePercent + extra;
}

function dayScore(wk, cid, di){
    const d = config.dtasks.length > 0 && config.dtasks.every(t=>getT(wk,cid,di,t.id))?1:0;
    const n = config.ntasks.length > 0 && config.ntasks.every(t=>getT(wk,cid,di,t.id))?1:0;
    return d+n;
}

function weekCalc(wk, cid){
    ensure(wk, cid);
    const c = D[wk][cid];
    let base = 0;
    for(let i=0; i<7; i++) base += dayScore(wk, cid, i);
    const extra = (c.bonus||0);
    const bh = base >= 3 ? Math.floor((base-3)/3) : 0;
    const total = bh + extra;
    return { 
        base, 
        bonus: extra, 
        used: c.used||0, 
        totalHours: total, 
        remHours: Math.max(0, total - (c.used||0)),
        rawTotalPoints: base + extra 
    };
}

function goView(v){
    document.getElementById('tab-ov').className = 'tab-btn' + (v==='ov'?' active':'');
    document.getElementById('tab-dt').className = 'tab-btn' + (v==='dt'?' active':'');
    document.getElementById('ov-panel').style.display = v==='ov'?'':'none';
    document.getElementById('dt-panel').style.display = v==='dt'?'':'none';
}

// 編輯器功能
function openEditor(){
    document.getElementById('edit-dtasks').value = config.dtasks.map(t=>t.l).join('\n');
    document.getElementById('edit-ntasks').value = config.ntasks.map(t=>t.l).join('\n');
    document.getElementById('modal-mask').style.display = 'flex';
}
function closeEditor(){ document.getElementById('modal-mask').style.display = 'none'; }
function saveTasks(){
    const dLines = document.getElementById('edit-dtasks').value.split('\n').filter(l=>l.trim()!=='');
    const nLines = document.getElementById('edit-ntasks').value.split('\n').filter(l=>l.trim()!=='');
    
    // 轉換為物件，簡單用內容當 ID (或可以用內容雜湊，這裡用內容)
    config.dtasks = dLines.map(l => ({id: 'task_'+l.trim(), l: l.trim()}));
    config.ntasks = nLines.map(l => ({id: 'task_'+l.trim(), l: l.trim()}));
    
    localSave();
    closeEditor();
    render();
}

function renderOv(){
    const wk = getWkKey(wkOff);
    let h = '';
    
    CH.forEach(c => {
        const res = weekCalc(wk, c.id);
        h += `<div class="person-row">`;
        h += `
        <div class="ov-card ${c.id==='a'?'hardy':'ted'}" onclick="pickChild('${c.id}')">
            <div class="ov-name">${c.icon} ${c.name}</div>
            <div class="ov-total">${res.rawTotalPoints} <span style="font-size:14px">分</span></div>
            <div class="ov-formula">基本 ${res.base} + 額外 ${res.bonus}</div>
            <div class="ov-rem-box">
                <span class="ov-rem-label">目前 ${res.remHours} 小時</span>
                <span class="ov-rem-sub">累計 ${res.totalHours} - 已領 ${res.used}</span>
            </div>
        </div>`;

        h += `<div class="dashboard-section">
            <div class="dash-header">
                <div class="dash-title">${c.icon} ${c.name} 完成率儀錶板</div>
            </div>
            <div class="dash-grid">`;
        for(let i=0; i<7; i++){
            const pct = getCompletionStatus(wk, c.id, i);
            const isExcellent = pct > 100;
            const barHeight = Math.min(100, pct);
            
            h += `<div class="dash-col">
                <div class="dash-bar-track">
                    <div class="dash-bar-fill ${isExcellent ? 'excellent' : ('normal-'+c.id)}" style="height:${barHeight}%"></div>
                </div>
                <div class="dash-label">週${DAYS[i]}</div>
                <div class="dash-pct">${pct}%</div>
                <div class="dash-star">${pct >= 100 ? '🌟' : ''}</div>
            </div>`;
        }
        h += `</div></div></div>`;
    });

    let bonusHistoryHtml = '';
    CH.forEach(c => {
        ensure(wk, c.id);
        const res = D[wk][c.id];
        if (res.bonus > 0 || res.note) {
            bonusHistoryHtml += `
            <div class="bonus-tag ${c.id === 'a' ? 'hardy' : 'ted'}">
                <span class="name-badge">${c.name}</span>
                <span class="reason">${res.note || '表現優異'}</span>
                <span class="points">+ ${res.bonus} 分</span>
            </div>`;
        }
    });

    if (bonusHistoryHtml) {
        h += `<div style="padding:0 20px 20px"><div class="dashboard-section" style="margin:0"><div class="dash-title" style="margin-bottom:15px">⭐ 本週加分紀錄</div>${bonusHistoryHtml}</div></div>`;
    }
    
    document.getElementById('ov-panel').innerHTML = h;
}

function renderDt(){
    const wk = getWkKey(wkOff);
    const c = CH.find(x=>x.id===aCh);
    const res = weekCalc(wk, c.id);
    const dates = getWkDates(wkOff);
    const todayStr = (new Date()).toISOString().split('T')[0];

    let h = `<div class="child-selector">`;
    CH.forEach(x => h += `<button class="child-btn ${aCh===x.id?'on-'+x.id:''}" onclick="pickChild('${x.id}')">${x.name}</button>`);
    h += `</div>`;

    h += `
    <div class="reward-banner">
        <div style="font-size:14px; opacity:0.8; margin-bottom:8px">獎勵兌換卡 (${c.name})</div>
        <div class="time-val">${res.remHours}<span style="font-size:20px; margin-left:8px; color:white">小時</span></div>
        <div style="font-size:12px; opacity:0.6; margin-top:12px">累計 ${res.totalHours} 小時 - 已領 ${res.used} 小時 = 目前 ${res.remHours} 小時</div>
    </div>`;

    for(let i=0; i<7; i++){
        const d = dates[i], ds = d.toISOString().split('T')[0];
        if(ds > todayStr) continue; 
        const comp = getCompletionStatus(wk, c.id, i);
        h += `<div class="day-group">
            <div class="day-head">
                <span>週${DAYS[i]} (${d.getMonth()+1}/${d.getDate()})</span>
                <span style="color:var(--text-muted); font-size:12px">今日完成 ${comp}% ${comp>=100?'🌟':''}</span>
            </div>
            
            <div class="task-section-label">☀️ 日間任務</div>
            ${config.dtasks.length > 0 ? 
                config.dtasks.map(t=>`<div class="task-item ${getT(wk,c.id,i,t.id)?'done-'+aCh:''}" onclick="togT('${wk}','${c.id}',${i},'${t.id}')"><div class="check-box">${getT(wk,c.id,i,t.id)?'✓':''}</div><span>${t.l}</span></div>`).join('') 
                : '<div style="font-size:11px; color:#999; margin:10px">尚無任務，請點右上角設定</div>'}
            
            <div class="task-section-label">🌙 夜間任務</div>
            ${config.ntasks.length > 0 ? 
                config.ntasks.map(t=>`<div class="task-item ${getT(wk,c.id,i,t.id)?'done-'+aCh:''}" onclick="togT('${wk}','${c.id}',${i},'${t.id}')"><div class="check-box">${getT(wk,c.id,i,t.id)?'✓':''}</div><span>${t.l}</span></div>`).join('') 
                : '<div style="font-size:11px; color:#999; margin:10px">尚無任務，請點右上角設定</div>'}
        </div>`;
    }

    h += `<div class="action-card">
        <div class="action-title">⭐ 額外加分項目</div>
        <div class="counter-box">
            <span>本週特別加分</span>
            <div class="counter-ctrl">
                <button class="nav-btn" onclick="adjB('${wk}','${c.id}',-1)">-</button>
                <span style="font-size:24px; font-weight:900">${D[wk]?.[c.id]?.bonus||0}</span>
                <button class="nav-btn" onclick="adjB('${wk}','${c.id}',1)">+</button>
            </div>
        </div>
        <textarea style="width:100%; margin-top:15px; border:1px solid #E2E8F0; border-radius:12px; padding:12px; font-size:14px; min-height:80px" placeholder="加分原因紀錄..." oninput="setNote('${wk}','${c.id}',this.value)">${D[wk]?.[c.id]?.note||''}</textarea>
    </div>`;

    h += `<div class="action-card" style="border-color: var(--accent-warm); background: #FFFBEB">
        <div class="action-title" style="color: #D97706">🎁 領取獎勵時數</div>
        <div class="counter-box">
            <span>已經兌換的時數</span>
            <div class="counter-ctrl">
                <button class="nav-btn" onclick="doUse('${wk}','${c.id}',-1)">-</button>
                <span style="font-size:24px; font-weight:900; color: #D97706">${D[wk]?.[c.id]?.used||0}</span>
                <button class="nav-btn" onclick="doUse('${wk}','${c.id}',1)" ${res.remHours<=0?'disabled':''}>+</button>
            </div>
        </div>
    </div>`;

    document.getElementById('dt-panel').innerHTML = h;
}

function getWkKey(off){
    const n = new Date(), dy = n.getDay(), m = new Date(n);
    m.setDate(n.getDate() - (dy === 0 ? 6 : dy - 1) + off * 7);
    return m.toISOString().split('T')[0];
}
function getWkDates(off){
    const n = new Date(), dy = n.getDay(), m = new Date(n);
    m.setDate(n.getDate() - (dy === 0 ? 6 : dy - 1) + off * 7);
    return Array.from({length:7}, (_,i)=>{ const d=new Date(m); d.setDate(m.getDate()+i); return d; });
}
function adjWk(n){ wkOff += n; render(); }
function pickChild(cid){ aCh = cid; goView('dt'); render(); }
function adjB(wk,cid,v){ ensure(wk,cid); D[wk][cid].bonus = Math.max(0, (D[wk][cid].bonus||0)+v); localSave(); render(); }
function doUse(wk,cid,v){ ensure(wk,cid); D[wk][cid].used = Math.max(0, (D[wk][cid].used||0)+v); localSave(); render(); }
function setNote(wk,cid,v){ ensure(wk,cid); D[wk][cid].note = v; localSave(); }

function render(){
    const dates = getWkDates(wkOff);
    document.getElementById('wkLbl').textContent = `${dates[0].getMonth()+1}/${dates[0].getDate()} - ${dates[6].getMonth()+1}/${dates[6].getDate()}`;
    renderOv();
    renderDt();
}

localLoad();
render();
</script>
</body>
</html>
