<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>竣翔 & 秉橙 獎懲記錄</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#FBEAF0;--pink-border:#F4C0D1;--pink-text:#72243E;
  --mint:#E1F5EE;--mint-border:#9FE1CB;--mint-text:#085041;
  --lavender:#EEEDFE;--lavender-border:#AFA9EC;--lavender-text:#3C3489;
  --amber-bg:#FAEEDA;--amber-text:#633806;
  --red-bg:#FCEBEB;--red-text:#791F1F;
  --blue-bg:#E6F1FB;--blue-text:#0C447C;--blue-border:#85B7EB;
  --bg:#fff;--bg2:#f7f7f5;--bg3:#f0ede8;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --r20:20px;--r16:16px;--r12:12px;--r8:8px
}
body{background:var(--bg3);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;min-height:100vh;padding:0}
.app{max-width:480px;margin:0 auto;padding:.75rem 1rem 2rem;background:var(--bg);min-height:100vh}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-top:.25rem}
.nav-wrap{display:flex;align-items:center;gap:8px}
.nav-btn{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--pink-border);background:var(--pink);cursor:pointer;font-size:16px;color:var(--pink-text);display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.week-lbl{font-size:14px;font-weight:600;color:var(--text)}
.vtabs{display:flex;gap:5px;margin-bottom:1rem;background:var(--bg2);border-radius:var(--r20);padding:3px}
.vtab{flex:1;padding:8px 0;border-radius:17px;border:none;background:transparent;font-size:13px;cursor:pointer;color:var(--text2);font-weight:500;-webkit-tap-highlight-color:transparent}
.vtab.on{background:var(--bg);color:var(--text);border:0.5px solid var(--border);font-weight:600}
.overview-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.ov-card{border-radius:var(--r16);padding:1rem;border:1.5px solid;cursor:pointer;-webkit-tap-highlight-color:transparent}
.ov-card:active{opacity:.85}
.ov-card-a{background:var(--lavender);border-color:var(--lavender-border)}
.ov-card-b{background:var(--mint);border-color:var(--mint-border)}
.ov-name{font-size:12px;font-weight:600;margin-bottom:4px}
.ov-name-a{color:var(--lavender-text)}
.ov-name-b{color:var(--mint-text)}
.ov-score{font-size:30px;font-weight:600;line-height:1;color:var(--text)}
.ov-detail{font-size:11px;color:var(--text2);margin:3px 0 5px}
.ov-hours{font-size:13px;font-weight:600;margin-bottom:6px}
.ov-hours-a{color:var(--lavender-text)}
.ov-hours-b{color:var(--mint-text)}
.pill{display:inline-block;border-radius:12px;padding:3px 9px;font-size:11px;font-weight:600}
.pill-ok{background:var(--mint);color:var(--mint-text)}
.pill-warn{background:var(--amber-bg);color:var(--amber-text)}
.pill-no{background:var(--red-bg);color:var(--red-text)}
.days-row{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:.75rem}
.dc{display:flex;flex-direction:column;align-items:center;gap:3px}
.dc-lbl{font-size:10px;color:var(--text2)}
.dc-pip{width:100%;aspect-ratio:1;border-radius:var(--r12);border:1.5px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.dc-pip.future{opacity:.3}
.pr{display:flex;gap:3px}
.dot{width:9px;height:9px;border-radius:50%;background:var(--border2)}
.dot.gn{background:#1D9E75}
.dot.pu{background:#534AB7}
.dc-pts{font-size:10px;color:var(--text2)}
.legend-row{display:flex;gap:12px;margin-bottom:1rem;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)}
.dot-s{width:8px;height:8px;border-radius:50%;display:inline-block}
.child-tabs{display:flex;gap:6px;margin-bottom:1rem}
.ctab{flex:1;padding:9px 0;border-radius:var(--r12);border:1.5px solid var(--border);background:var(--bg2);font-size:14px;font-weight:600;cursor:pointer;color:var(--text2);-webkit-tap-highlight-color:transparent}
.ctab.on-a{background:var(--lavender);color:var(--lavender-text);border-color:var(--lavender-border)}
.ctab.on-b{background:var(--mint);color:var(--mint-text);border-color:var(--mint-border)}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.stat-box{background:var(--bg2);border-radius:var(--r12);padding:.7rem .9rem}
.stat-lbl{font-size:11px;color:var(--text2);margin-bottom:3px}
.stat-val{font-size:24px;font-weight:600;color:var(--text)}
.stat-sub{font-size:11px;color:var(--text2);margin-top:1px}
.result-pill{border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;display:inline-block;margin-bottom:1rem}
.reward-box{border-radius:var(--r16);border:1.5px solid var(--blue-border);background:var(--blue-bg);padding:1rem;margin-bottom:1rem}
.reward-title{font-size:13px;font-weight:600;color:var(--blue-text);margin-bottom:.75rem}
.reward-hours-display{display:flex;align-items:baseline;gap:6px;margin-bottom:.5rem}
.reward-big{font-size:40px;font-weight:700;color:var(--blue-text);line-height:1}
.reward-unit{font-size:15px;color:var(--blue-text);font-weight:500}
.reward-breakdown{font-size:11px;color:var(--blue-text);opacity:.7;margin-bottom:.85rem;line-height:1.7}
.reward-actions{display:flex;gap:8px}
.r-btn{flex:1;padding:11px 0;border-radius:var(--r12);border:none;font-size:14px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
.r-btn:active{opacity:.8}
.r-btn-use{background:var(--blue-text);color:#fff}
.r-btn-use:disabled{background:#b0c4d8;color:#fff;cursor:default}
.r-btn-ret{background:rgba(12,68,124,0.12);color:var(--blue-text)}
.reward-used-row{display:flex;align-items:center;justify-content:space-between;margin-top:.65rem;padding-top:.65rem;border-top:1px solid rgba(12,68,124,0.15)}
.reward-used-lbl{font-size:12px;color:var(--blue-text);opacity:.7}
.reward-used-val{font-size:13px;font-weight:600;color:var(--blue-text)}
.day-block{background:var(--bg);border:1px solid var(--border);border-radius:var(--r16);padding:1rem;margin-bottom:.75rem}
.db-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.db-title{font-size:14px;font-weight:600;color:var(--text)}
.db-pts{font-size:12px;padding:2px 9px;border-radius:12px;font-weight:600}
.db-pts.on{background:var(--mint);color:var(--mint-text)}
.db-pts.off{background:var(--bg2);color:var(--text2)}
.sec-lbl{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.sec-icon{width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.ic-day{background:var(--mint);color:var(--mint-text)}
.ic-night{background:var(--lavender);color:var(--lavender-text)}
.task-list{display:flex;flex-direction:column;gap:5px;margin-bottom:.75rem}
.task-row{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:var(--r8);border:1px solid var(--border);background:var(--bg2);cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.task-row:active{opacity:.7}
.task-row.ck{background:var(--mint);border-color:var(--mint-border)}
.task-row.ck-night{background:var(--lavender);border-color:var(--lavender-border)}
.chk{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;background:var(--bg)}
.task-row.ck .chk{background:#1D9E75;border-color:#1D9E75;color:#fff}
.task-row.ck-night .chk{background:#534AB7;border-color:#534AB7;color:#fff}
.tn{font-size:14px;color:var(--text)}
.task-row.ck .tn{color:var(--mint-text)}
.task-row.ck-night .tn{color:var(--lavender-text)}
.bonus-block{background:var(--bg);border:1px solid var(--border);border-radius:var(--r16);padding:1rem;margin-bottom:.75rem}
.bonus-row{display:flex;align-items:center;gap:8px;margin-bottom:.65rem}
.bonus-row:last-of-type{margin-bottom:0}
.bl{font-size:13px;color:var(--text2);flex:1;line-height:1.3}
.bl-sub{font-size:10px;color:var(--text3);display:block;margin-top:2px}
.bctrl{display:flex;align-items:center;gap:10px}
.bb{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border2);background:none;cursor:pointer;font-size:18px;color:var(--text2);display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.bb:active{background:var(--bg2)}
.bv{font-size:16px;font-weight:600;min-width:24px;text-align:center;color:var(--text)}
.divider{border:none;border-top:1px solid var(--border);margin:.7rem 0}
.note-lbl{font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600;margin-top:.85rem;display:block}
.note-area{width:100%;border-radius:var(--r8);border:1px solid var(--border);padding:10px 12px;font-size:14px;font-family:inherit;color:var(--text);background:var(--bg2);resize:none;min-height:70px}
.note-area:focus{outline:none;border-color:var(--lavender-border)}
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <div class="nav-wrap">
      <button class="nav-btn" id="prevWeek">&#8249;</button>
      <span class="week-lbl" id="weekLbl">載入中…</span>
      <button class="nav-btn" id="nextWeek">&#8250;</button>
    </div>
  </div>
  <div class="vtabs">
    <button class="vtab on" id="vt-ov" onclick="setView('ov')">總覽</button>
    <button class="vtab" id="vt-dt" onclick="setView('dt')">詳細記錄</button>
  </div>
  <div id="ov-panel"></div>
  <div id="dt-panel" style="display:none"></div>
</div>

<script>
const CH=[{id:'a',name:'竣翔'},{id:'b',name:'秉橙'}];
const DAYS=['一','二','三','四','五'];
const DTASKS=[
  {id:'wake',l:'準時起床'},{id:'dishes',l:'洗碗'},{id:'water',l:'裝水'},
  {id:'lunchbox',l:'收餐盒'},{id:'report',l:'到校回報'},{id:'med',l:'吃藥（或保健品）'},
];
const NTASKS=[
  {id:'eat',l:'好好吃飯'},{id:'litter',l:'清貓砂'},
  {id:'bowl',l:'洗餐碗（含晚餐）'},{id:'brush',l:'8點半前刷牙'},{id:'sleep',l:'9點準時睡覺'},
];

let wkOff=0,aCh='a',curView='ov';
let D={};

function localSave(){try{localStorage.setItem('kids_reward',JSON.stringify(D))}catch(e){}}
function localLoad(){try{return JSON.parse(localStorage.getItem('kids_reward')||'{}')}catch(e){return{}}}

function ensure(wk,cid){
  if(!D[wk])D[wk]={};
  if(!D[wk][cid])D[wk][cid]={days:{},bonus:0,study:0,note:'',used:0};
  const c=D[wk][cid];
  if(typeof c.bonus!=='number')c.bonus=0;
  if(typeof c.study!=='number')c.study=0;
  if(typeof c.note!=='string')c.note='';
  if(typeof c.used!=='number')c.used=0;
}
function getT(wk,cid,di,tid){return D?.[wk]?.[cid]?.days?.[di]?.[tid]===true}
function setT(wk,cid,di,tid,v){ensure(wk,cid);if(!D[wk][cid].days[di])D[wk][cid].days[di]={};D[wk][cid].days[di][tid]=v;localSave();render()}
function getB(wk,cid,k){const v=D?.[wk]?.[cid]?.[k];return typeof v==='number'?v:0}
function setB(wk,cid,k,v){ensure(wk,cid);D[wk][cid][k]=Math.max(0,v);localSave();render()}
function getNote(wk,cid){return D?.[wk]?.[cid]?.note||''}
function setNote(wk,cid,v){ensure(wk,cid);D[wk][cid].note=v;localSave()}

function wkKey(off){
  const n=new Date(),dy=n.getDay(),m=new Date(n);
  m.setDate(n.getDate()-(dy===0?6:dy-1)+off*7);
  return `${m.getFullYear()}-${String(m.getMonth()+1).padStart(2,'0')}-${String(m.getDate()).padStart(2,'0')}`;
}
function wkDates(off){
  const n=new Date(),dy=n.getDay(),m=new Date(n);
  m.setDate(n.getDate()-(dy===0?6:dy-1)+off*7);
  return Array.from({length:5},(_,i)=>{const d=new Date(m);d.setDate(m.getDate()+i);return d});
}
function todayS(){const n=new Date();return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`}
function dStr(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function fmtWk(ds){const a=ds[0],b=ds[4];return `${a.getMonth()+1}/${a.getDate()} – ${b.getMonth()+1}/${b.getDate()}`}

function dayScore(wk,cid,di){
  return (DTASKS.every(t=>getT(wk,cid,di,t.id))?1:0)+(NTASKS.every(t=>getT(wk,cid,di,t.id))?1:0);
}
function weekCalc(wk,cid){
  let base=0;
  for(let i=0;i<5;i++)base+=dayScore(wk,cid,i);
  const bonus=getB(wk,cid,'bonus');
  const study=getB(wk,cid,'study');
  const used=getB(wk,cid,'used');
  // 基本分達標(>=3)後，每多3分換1小時
  const baseHours=base>=3?Math.floor((base-3)/3):0;
  // 額外加分與複習加分各1分=1小時
  const extraHours=bonus+study;
  const totalHours=baseHours+extraHours;
  const remaining=Math.max(0,totalHours-used);
  return{base,bonus,study,used,baseHours,extraHours,totalHours,remaining};
}

window.setView=function(v){
  curView=v;
  document.getElementById('vt-ov').className='vtab'+(v==='ov'?' on':'');
  document.getElementById('vt-dt').className='vtab'+(v==='dt'?' on':'');
  document.getElementById('ov-panel').style.display=v==='ov'?'':'none';
  document.getElementById('dt-panel').style.display=v==='dt'?'':'none';
};
window.switchCh=function(cid){aCh=cid;render()};
window.togT=function(wk,cid,di,tid){setT(wk,cid,di,tid,!getT(wk,cid,di,tid))};
window.adjB=function(wk,cid,k,d){setB(wk,cid,k,getB(wk,cid,k)+d)};
window.useHour=function(wk,cid){
  ensure(wk,cid);
  const{totalHours,used}=weekCalc(wk,cid);
  if(used>=totalHours)return;
  D[wk][cid].used=used+1;localSave();render();
};
window.retHour=function(wk,cid){
  ensure(wk,cid);
  const used=getB(wk,cid,'used');
  if(used<=0)return;
  D[wk][cid].used=used-1;localSave();render();
};
window.saveNote=function(wk,cid,v){setNote(wk,cid,v)};
window.goDetail=function(cid){aCh=cid;setView('dt')};

function renderOv(wk,dates){
  const p=document.getElementById('ov-panel');
  const today=todayS();
  let h='<div class="overview-cards">';
  CH.forEach(c=>{
    const calc=weekCalc(wk,c.id);
    const basePill=calc.base>=3
      ?`<span class="pill pill-ok">基本達標</span>`
      :`<span class="pill pill-no">未達標（${calc.base}/3）</span>`;
    h+=`<div class="ov-card ov-card-${c.id}" onclick="goDetail('${c.id}')">
      <div class="ov-name ov-name-${c.id}">${c.name}</div>
      <div class="ov-score">${calc.base+calc.bonus+calc.study}</div>
      <div class="ov-detail">基本${calc.base} ＋ 額外${calc.bonus} ＋ 複習${calc.study}</div>
      <div class="ov-hours ov-hours-${c.id}">剩餘 ${calc.remaining} 小時 ／ 共 ${calc.totalHours} 小時</div>
      ${basePill}
    </div>`;
  });
  h+='</div><div class="days-row">';
  for(let i=0;i<5;i++){
    const ds=dStr(dates[i]);
    const fut=ds>today;
    const sa=dayScore(wk,'a',i),sb=dayScore(wk,'b',i);
    h+=`<div class="dc">
      <span class="dc-lbl">週${DAYS[i]}</span>
      <div class="dc-pip${fut?' future':''}">
        <div class="pr"><div class="dot${sa>=1?' gn':''}"></div><div class="dot${sb>=1?' gn':''}"></div></div>
        <div class="pr"><div class="dot${sa>=2?' pu':''}"></div><div class="dot${sb>=2?' pu':''}"></div></div>
      </div>
      <span class="dc-pts">${sa+sb}分</span>
    </div>`;
  }
  h+='</div>';
  h+=`<div class="legend-row">
    <span class="leg"><span class="dot-s" style="background:#1D9E75"></span>白天完成</span>
    <span class="leg"><span class="dot-s" style="background:#534AB7"></span>晚上完成</span>
    <span class="leg" style="color:#aaa">左=竣翔　右=秉橙</span>
  </div>`;
  p.innerHTML=h;
}

function renderDt(wk,dates){
  const p=document.getElementById('dt-panel');
  const c=CH.find(x=>x.id===aCh);
  const calc=weekCalc(wk,c.id);
  const today=todayS();
  const note=getNote(wk,c.id);
  const canUse=calc.remaining>0;
  const basePillCls=calc.base>=3?'pill-ok':'pill-no';
  const basePillTxt=calc.base>=3?'基本任務達標':'基本任務未達標（'+calc.base+'/3分）';

  let h=`<div class="child-tabs">`;
  CH.forEach(x=>{
    const on=x.id===aCh;
    h+=`<button class="ctab${on?' on-'+x.id:''}" onclick="switchCh('${x.id}')">${x.name}</button>`;
  });
  h+=`</div>
  <div class="stat-row">
    <div class="stat-box">
      <div class="stat-lbl">本週總分</div>
      <div class="stat-val">${calc.base+calc.bonus+calc.study}</div>
      <div class="stat-sub">基本${calc.base} ＋ 額外${calc.bonus} ＋ 複習${calc.study}</div>
    </div>
    <div class="stat-box">
      <div class="stat-lbl">可用電腦時數</div>
      <div class="stat-val">${calc.totalHours} 小時</div>
      <div class="stat-sub">基本換算 ${calc.baseHours} 小時 ＋ 獎勵 ${calc.extraHours} 小時</div>
    </div>
  </div>
  <span class="result-pill ${basePillCls}">${basePillTxt}</span>`;

  h+=`<div class="reward-box">
    <div class="reward-title">電腦時數使用情況</div>
    <div class="reward-hours-display">
      <span class="reward-big">${calc.remaining}</span>
      <span class="reward-unit">小時可用</span>
    </div>
    <div class="reward-breakdown">
      基本換算 ${calc.baseHours} 小時　＋　額外加分 ${calc.bonus} 小時　＋　複習加分 ${calc.study} 小時<br>
      共 ${calc.totalHours} 小時　已使用 ${calc.used} 小時　剩餘 ${calc.remaining} 小時
    </div>
    <div class="reward-actions">
      <button class="r-btn r-btn-use" onclick="useHour('${wk}','${c.id}')" ${!canUse?'disabled':''}>使用 1 小時</button>
      <button class="r-btn r-btn-ret" onclick="retHour('${wk}','${c.id}')">退回 1 小時</button>
    </div>
    <div class="reward-used-row">
      <span class="reward-used-lbl">本週已使用</span>
      <span class="reward-used-val">${calc.used} 小時</span>
    </div>
  </div>`;

  for(let i=0;i<5;i++){
    const d=dates[i];
    if(dStr(d)>today)continue;
    const sc=dayScore(wk,c.id,i);
    const dd=DTASKS.every(t=>getT(wk,c.id,i,t.id));
    const nd=NTASKS.every(t=>getT(wk,c.id,i,t.id));
    h+=`<div class="day-block">
      <div class="db-header">
        <span class="db-title">週${DAYS[i]}・${d.getMonth()+1}/${d.getDate()}</span>
        <span class="db-pts ${sc>0?'on':'off'}">+${sc}分</span>
      </div>
      <div class="sec-lbl"><span class="sec-icon ic-day">☀</span>白天任務${dd?' ✓':''}</div>
      <div class="task-list">`;
    DTASKS.forEach(t=>{
      const done=getT(wk,c.id,i,t.id);
      h+=`<div class="task-row${done?' ck':''}" onclick="togT('${wk}','${c.id}',${i},'${t.id}')"><div class="chk">${done?'✓':''}</div><span class="tn">${t.l}</span></div>`;
    });
    h+=`</div><div class="sec-lbl" style="margin-top:4px"><span class="sec-icon ic-night">★</span>晚上任務${nd?' ✓':''}</div><div class="task-list">`;
    NTASKS.forEach(t=>{
      const done=getT(wk,c.id,i,t.id);
      h+=`<div class="task-row${done?' ck-night':''}" onclick="togT('${wk}','${c.id}',${i},'${t.id}')"><div class="chk">${done?'✓':''}</div><span class="tn">${t.l}</span></div>`;
    });
    h+=`</div></div>`;
  }

  h+=`<div class="bonus-block">
    <div class="sec-lbl">加分記錄</div>
    <div class="bonus-row">
      <span class="bl">額外表現加分<span class="bl-sub">每 +1 分 = 1 小時電腦時間</span></span>
      <div class="bctrl">
        <button class="bb" onclick="adjB('${wk}','${c.id}','bonus',-1)">−</button>
        <span class="bv">${calc.bonus}</span>
        <button class="bb" onclick="adjB('${wk}','${c.id}','bonus',1)">+</button>
      </div>
    </div>
    <hr style="border:none;border-top:1px solid var(--border);margin:.7rem 0">
    <div class="bonus-row">
      <span class="bl">複習進度加分<span class="bl-sub">每 +1 分 = 1 小時電腦時間</span></span>
      <div class="bctrl">
        <button class="bb" onclick="adjB('${wk}','${c.id}','study',-1)">−</button>
        <span class="bv">${calc.study}</span>
        <button class="bb" onclick="adjB('${wk}','${c.id}','study',1)">+</button>
      </div>
    </div>
    <span class="note-lbl">複習備註</span>
    <textarea class="note-area" placeholder="例：今天複習數學30分鐘、背了10個單字…" oninput="saveNote('${wk}','${c.id}',this.value)"></textarea>
  </div>`;

  p.innerHTML=h;
  const ta=p.querySelector('.note-area');
  if(ta)ta.value=note;
}

function render(){
  const wk=wkKey(wkOff);
  const dates=wkDates(wkOff);
  document.getElementById('weekLbl').textContent=fmtWk(dates);
  renderOv(wk,dates);
  renderDt(wk,dates);
}

document.getElementById('prevWeek').addEventListener('click',()=>{wkOff--;render()});
document.getElementById('nextWeek').addEventListener('click',()=>{wkOff++;render()});

D=localLoad();
render();
</script>
</body>
</html>
