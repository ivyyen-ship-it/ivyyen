<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>粉嫩繽紛獎勵看板</title>
<style>
:root {
  --bg-main: #FDF4F9;
  --card-white: rgba(255, 255, 255, 0.9);
  --text-main: #4A5568;
  --theme-color: #FBB6CE;
  --theme-bg: #FFF5F7;
  --radius-card: 28px;
  --shadow-soft: 0 12px 24px rgba(0, 0, 0, 0.05);
  /* 鮮紅色定義 */
  --vivid-red: #FF0000;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
    background: linear-gradient(135deg, var(--theme-bg) 0%, #F0F5FF 100%);
    font-family: "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
    color: var(--text-main);
    margin: 0;
    padding-bottom: 40px;
    min-height: 100vh;
}

.app { max-width: 900px; margin: 0 auto; position: relative; }

/* Header */
.header {
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(15px);
    border-bottom: 2px solid rgba(0, 0, 0, 0.05);
}

.week-nav {
    display: flex;
    align-items: center;
    background: white;
    padding: 6px 12px;
    border-radius: 50px;
    box-shadow: var(--shadow-soft);
}

.nav-btn {
    width: 30px; height: 30px; border: none; background: #f8f9fa;
    border-radius: 50%; cursor: pointer; font-weight: bold;
    display: flex; align-items: center; justify-content: center;
    color: var(--theme-color);
}

.week-label { font-size: 14px; font-weight: 800; margin: 0 10px; min-width: 90px; text-align: center; color: var(--theme-color); }

.settings-btn {
    background: white; border: none; width: 40px; height: 40px;
    border-radius: 50%; box-shadow: var(--shadow-soft);
    cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
}

/* Tabs */
.tabs { display: flex; padding: 15px 20px; gap: 10px; }
.tab-btn {
    flex: 1; padding: 10px; border: none; border-radius: 18px;
    background: white; color: #A0AEC0; font-weight: 800; cursor: pointer;
    transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.03);
}
.tab-btn.active { background: var(--theme-color); color: white; box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1); }

/* Layout Grid */
.child-row {
    display: flex;
    flex-direction: row;
    gap: 15px;
    padding: 0 20px;
    margin-bottom: 25px;
    align-items: stretch;
}

@media (max-width: 640px) {
    .child-row { flex-direction: column; }
}

.child-ov-card {
    flex: 1;
    min-width: 220px;
    background: var(--card-white);
    border-radius: var(--radius-card);
    padding: 20px;
    box-shadow: var(--shadow-soft);
    border: 3px solid transparent;
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    cursor: pointer;
}
.child-ov-card.active { border-color: currentColor; background: white; }

.child-avatar { font-size: 32px; display: block; margin-bottom: 5px; }
.child-name { font-weight: 900; font-size: 20px; margin-bottom: 8px; display: block; }
.score-display { margin-bottom: 10px; }
.score-val { font-size: 42px; font-weight: 900; line-height: 1; }
.score-unit { font-size: 14px; margin-left: 4px; color: #718096; }

.chart-section {
    flex: 2;
    min-width: 300px;
    background: white;
    border-radius: var(--radius-card);
    padding: 20px;
    box-shadow: var(--shadow-soft);
}

.chart-title { font-size: 15px; font-weight: 900; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; color: #4A5568; }
.chart-title::before { content: ''; display: block; width: 5px; height: 20px; background: var(--theme-color); border-radius: 3px; }

.chart-grid { display: flex; justify-content: space-between; align-items: flex-end; height: 130px; }
.chart-col { flex: 1; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
.bar-track {
    width: 18px; height: 70px; background: #F7FAFC; border-radius: 10px;
    position: relative; margin-bottom: 8px; border: 1px solid #EDF2F7;
}
.bar-fill {
    position: absolute; bottom: 0; width: 100%; border-radius: 10px;
    transition: height 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.col-label { font-size: 10px; font-weight: 800; color: #718096; }
.col-pct { font-size: 9px; font-weight: 900; margin-top: 2px; color: #2D3748; }

/* History Section */
.history-section {
    background: white;
    margin: 0 20px 20px;
    border-radius: 20px;
    padding: 18px;
    box-shadow: var(--shadow-soft);
}
.history-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.history-table th { text-align: left; color: #718096; padding: 8px; border-bottom: 1px solid #EDF2F7; }
.history-table td { padding: 8px; border-bottom: 1px solid #F7FAFC; }

/* 鮮紅色分數樣式 */
.bonus-score-vivid {
    font-weight: 950;
    color: var(--vivid-red);
    font-size: 14px;
}

/* Tasks View */
.day-selector { display: flex; overflow-x: auto; padding: 0 20px 15px; gap: 8px; scrollbar-width: none; }
.day-tab {
    flex: 0 0 auto; padding: 8px 16px; border-radius: 50px; background: white;
    border: 2px solid #F7FAFC; font-size: 13px; font-weight: 800; cursor: pointer;
    box-shadow: 0 4px 8px rgba(0,0,0,0.03); color: #718096;
}
.day-tab.active { background: var(--theme-color); color: white; border-color: var(--theme-color); }

.task-card { background: white; margin: 0 20px 15px; border-radius: var(--radius-card); padding: 20px; box-shadow: var(--shadow-soft); }
.task-item {
    display: flex; align-items: center; padding: 10px 15px; border-radius: 15px;
    margin-bottom: 6px; cursor: pointer; border: 2px solid transparent; font-size: 14px;
}
.task-item.day-type { background: #FEFCBF; border-color: #FAF089; }
.task-item.day-type.checked { background: #C6F6D5; border-color: #9AE6B4; }
.task-item.night-type { background: #E9D8FD; border-color: #D6BCFA; }
.task-item.night-type.checked { background: #B2F5EA; border-color: #81E6D9; }

.check-circle { width: 22px; height: 22px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.8); margin-right: 10px; display: flex; align-items: center; justify-content: center; background: white; color: #48BB78; font-size: 12px; font-weight: bold; }

/* Settings Modal */
.modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 1000; }
.modal-content { background: white; width: 92%; max-width: 500px; border-radius: 30px; padding: 25px; max-height: 85vh; overflow-y: auto; }
.form-group { margin-bottom: 18px; }
.form-input { width: 100%; padding: 10px 15px; border: 2px solid #EDF2F7; border-radius: 12px; font-size: 14px; margin-top: 5px; outline: none; }
.form-input:focus { border-color: var(--theme-color); }
.setting-row { display: flex; align-items: center; gap: 10px; margin-top: 5px; }
.member-edit-box { border: 2px solid #F7FAFC; padding: 15px; border-radius: 15px; margin-bottom: 15px; position: relative; }
</style>
</head>
<body>

<div class="app">
    <header class="header">
        <div class="week-nav">
            <button class="nav-btn" onclick="changeWk(-1)">‹</button>
            <span class="week-label" id="wkDisplay">...</span>
            <button class="nav-btn" onclick="changeWk(1)">›</button>
        </div>
        <button class="settings-btn" onclick="showSettings()">🍩</button>
    </header>

    <div class="tabs">
        <button class="tab-btn active" id="tab-dashboard" onclick="switchView('dashboard')">數據看板</button>
        <button class="tab-btn" id="tab-tasks" onclick="switchView('tasks')">任務明細</button>
    </div>

    <div id="view-dashboard">
        <div id="main-content-area"></div>
        <div class="history-section">
            <div class="chart-title">📝 本週加分明細紀錄</div>
            <table class="history-table">
                <thead>
                    <tr><th>名字</th><th>日期</th><th>備註</th><th>分數</th></tr>
                </thead>
                <tbody id="history-body"></tbody>
            </table>
        </div>
    </div>

    <div id="view-tasks" style="display:none">
        <div class="day-selector" id="day-tabs"></div>
        <div id="tasks-content"></div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-mask" id="settings-modal" onclick="if(event.target==this)hideSettings()">
        <div class="modal-content">
            <h2 style="text-align:center; color:var(--theme-color); margin-top: 0;">🍭 系統與計分設定</h2>
            
            <div class="form-group">
                <label style="font-weight:900; color:#718096">🎨 介面主題色</label>
                <div class="theme-picker" style="display:flex; gap:10px; margin-top:5px" id="theme-options"></div>
            </div>

            <div class="form-group" style="background:#F7FAFC; padding:15px; border-radius:15px">
                <label style="font-weight:900; color:#4A5568">⚖️ 計分邏輯設定</label>
                <div class="setting-row">
                    <span style="font-size:13px">日間：</span>
                    <select class="form-input" style="width:auto; margin:0; flex: 1;" id="set-dmode">
                        <option value="all">全達成才給分</option>
                        <option value="each">按比例給分</option>
                    </select>
                    <input type="number" class="form-input" style="width:60px; margin:0" id="set-dscore"> 分
                </div>
                <div class="setting-row" style="margin-top:10px">
                    <span style="font-size:13px">夜間：</span>
                    <select class="form-input" style="width:auto; margin:0; flex: 1;" id="set-nmode">
                        <option value="all">全達成才給分</option>
                        <option value="each">按比例給分</option>
                    </select>
                    <input type="number" class="form-input" style="width:60px; margin:0" id="set-nscore"> 分
                </div>
            </div>

            <div id="member-settings-list"></div>
            <button onclick="addNewMember()" style="width:100%; padding:12px; border:2px dashed #CBD5E1; border-radius:15px; background:none; cursor:pointer; font-weight:800; color:#A0AEC0; margin-bottom:20px">+ 新增成員</button>

            <div class="form-group">
                <label style="font-weight:900; color:#718096">💎 獎勵單位</label>
                <input type="text" id="set-unit" class="form-input">
            </div>

            <div class="form-group">
                <label style="font-weight:900; color:#718096">☀️ 日間任務 (每行一項)</label>
                <textarea id="set-dtasks" class="form-input" style="height:70px"></textarea>
            </div>

            <div class="form-group">
                <label style="font-weight:900; color:#718096">🌙 夜間任務 (每行一項)</label>
                <textarea id="set-ntasks" class="form-input" style="height:70px"></textarea>
            </div>

            <button onclick="commitSettings()" style="width:100%; padding:15px; border:none; border-radius:15px; background:var(--theme-color); color:white; font-weight:800; cursor:pointer">儲存並關閉</button>
        </div>
    </div>
</div>

<script>
const EMOJIS = ['👦🏻','👧🏻','👦🏼','👧🏼','👶🏻','🐶','🐱','🐻','🦁','🦊','🐼','🐨','🦄','🌈','🎨','⚽️'];
const WEEK_DAYS = ['一', '二', '三', '四', '五', '六', '日'];
const THEMES = [
    { main: '#FBB6CE', bg: '#FFF5F7' }, { main: '#BEE3F8', bg: '#EBF8FF' },
    { main: '#C6F6D5', bg: '#F0FFF4' }, { main: '#FAF089', bg: '#FFFFF0' }, { main: '#E9D8FD', bg: '#FAF5FF' }
];

let state = {
    wkOffset: 0, activeChild: '', activeDay: (new Date().getDay() || 7) - 1,
    config: {
        themeIndex: 0, unit: '分',
        dMode: 'all', dScore: 1, nMode: 'all', nScore: 1,
        members: [
            {id: 'c1', name: 'Hardy', emoji: '👦🏻', color: '#FBB6CE'},
            {id: 'c2', name: 'Ted', emoji: '👦🏼', color: '#BEE3F8'}
        ],
        dtasks: ['準時起床 ⏰', '洗碗 🥣', '裝水 💧', '收餐盒 🍱', '到校回報 📱'],
        ntasks: ['好好吃飯 🥗', '清貓砂 🐈', '洗餐碗 🧼', '刷牙 🪥', '睡覺 🌙']
    },
    data: {}
};

function applyTheme() {
    const t = THEMES[state.config.themeIndex || 0];
    document.documentElement.style.setProperty('--theme-color', t.main);
    document.documentElement.style.setProperty('--theme-bg', t.bg);
}

function load() {
    const saved = localStorage.getItem('kids_bonus_v5');
    if (saved) {
        const p = JSON.parse(saved);
        state.config = {...state.config, ...p.config};
        state.data = p.data || {};
    }
    state.activeChild = state.config.members[0].id;
    applyTheme(); render();
}

function save() { 
    localStorage.setItem('kids_bonus_v5', JSON.stringify({ config: state.config, data: state.data })); 
}

function getWkKey(offset) {
    const d = new Date();
    d.setDate(d.getDate() - (d.getDay() || 7) + 1 + offset * 7);
    return d.toISOString().split('T')[0];
}

function ensureData(wkKey, cid) {
    const key = `${wkKey}_${cid}`;
    if (!state.data[key]) state.data[key] = { days: {} };
    for (let i = 0; i < 7; i++) {
        if (!state.data[key].days[i]) {
            state.data[key].days[i] = { tasks: {}, bonus: 0, used: 0, note: '' };
        }
    }
}

function calcDay(wkKey, cid, di) {
    ensureData(wkKey, cid);
    const day = state.data[`${wkKey}_${cid}`].days[di];
    let doneD = 0, doneN = 0;
    state.config.dtasks.forEach((_, i) => { if(day.tasks['d'+i]) doneD++; });
    state.config.ntasks.forEach((_, i) => { if(day.tasks['n'+i]) doneN++; });

    const totalD = state.config.dtasks.length;
    const totalN = state.config.ntasks.length;

    let scoreD = 0;
    if (state.config.dMode === 'all') {
        scoreD = (doneD === totalD && totalD > 0) ? state.config.dScore : 0;
    } else {
        scoreD = totalD > 0 ? (doneD / totalD) * state.config.dScore : 0;
    }

    let scoreN = 0;
    if (state.config.nMode === 'all') {
        scoreN = (doneN === totalN && totalN > 0) ? state.config.nScore : 0;
    } else {
        scoreN = totalN > 0 ? (doneN / totalN) * state.config.nScore : 0;
    }

    const totalScore = Number((scoreD + scoreN + (day.bonus || 0)).toFixed(1));
    let pct = Math.round(((doneD + doneN) / (totalD + totalN || 1)) * 100);

    return { pct, total: totalScore, bonus: day.bonus, used: day.used || 0, note: day.note || '' };
}

function calcWeek(wkKey, cid) {
    let total = 0, used = 0;
    for(let i=0; i<7; i++) {
        const r = calcDay(wkKey, cid, i);
        total += r.total; used += r.used;
    }
    return { total: Number(total.toFixed(1)), used, rem: Math.max(0, total - used) };
}

function render() {
    const wkKey = getWkKey(state.wkOffset);
    const startD = new Date(wkKey);
    const dates = Array.from({length:7}, (_, i) => {
        const d = new Date(startD); d.setDate(startD.getDate() + i); return d;
    });
    
    document.getElementById('wkDisplay').textContent = `${dates[0].getMonth()+1}/${dates[0].getDate()} - ${dates[6].getMonth()+1}/${dates[6].getDate()}`;

    // Dashboard View
    const container = document.getElementById('main-content-area');
    container.innerHTML = state.config.members.map(m => {
        const weekRes = calcWeek(wkKey, m.id);
        return `
        <div class="child-row">
            <div class="child-ov-card ${state.activeChild === m.id ? 'active' : ''}" style="color: ${m.color}" onclick="selectChild('${m.id}')">
                <span class="child-avatar">${m.emoji}</span>
                <span class="child-name">${m.name}</span>
                <div class="score-display">
                    <div class="score-val">${weekRes.total}<span class="score-unit">${state.config.unit}</span></div>
                </div>
                <div style="font-size:11px; color:#A0AEC0">剩餘: ${weekRes.rem.toFixed(1)} / 已領: ${weekRes.used}</div>
            </div>
            <div class="chart-section">
                <div class="chart-title">${m.name} 成長紀錄</div>
                <div class="chart-grid">
                    ${WEEK_DAYS.map((d, i) => {
                        const r = calcDay(wkKey, m.id, i);
                        return `
                        <div class="chart-col" onclick="selectChild('${m.id}', ${i})">
                            <div class="bar-track"><div class="bar-fill" style="height:${Math.min(100, r.pct)}%; background:${m.color}"></div></div>
                            <div class="col-label">${d}</div>
                            <div class="col-pct">${r.pct}%</div>
                        </div>`;
                    }).join('')}
                </div>
            </div>
        </div>`;
    }).join('');

    // History - 此處將分數欄位修改為鮮紅色
    const histBody = document.getElementById('history-body');
    let histHTML = '';
    state.config.members.forEach(m => {
        for(let i=0; i<7; i++) {
            const r = calcDay(wkKey, m.id, i);
            if(r.bonus > 0) {
                histHTML += `<tr>
                    <td>${m.emoji} ${m.name}</td>
                    <td>${dates[i].getMonth()+1}/${dates[i].getDate()}</td>
                    <td>${r.note || '額外加分'}</td>
                    <td class="bonus-score-vivid">+${r.bonus}</td>
                </tr>`;
            }
        }
    });
    histBody.innerHTML = histHTML || '<tr><td colspan="4" style="text-align:center; color:#A0AEC0; padding: 20px;">本週尚無加分紀錄</td></tr>';

    // Tasks View
    if(document.getElementById('view-tasks').style.display !== 'none') {
        const todayStr = new Date().toISOString().split('T')[0];
        document.getElementById('day-tabs').innerHTML = WEEK_DAYS.map((d, i) => {
            const isFuture = dates[i].toISOString().split('T')[0] > todayStr;
            return `<button class="day-tab ${state.activeDay===i?'active':''}" ${isFuture?'disabled':''} onclick="state.activeDay=${i}; render();">週${d}</button>`;
        }).join('');

        const child = state.config.members.find(m => m.id === state.activeChild) || state.config.members[0];
        ensureData(wkKey, child.id);
        const dayData = state.data[`${wkKey}_${child.id}`].days[state.activeDay];

        document.getElementById('tasks-content').innerHTML = `
            <div class="task-card">
                <div style="font-weight:900; font-size:18px; margin-bottom:12px">${child.emoji} ${child.name} - 任務</div>
                ${state.config.dtasks.map((t, i) => `
                    <div class="task-item day-type ${dayData.tasks['d'+i]?'checked':''}" onclick="toggleTask('d${i}')">
                        <div class="check-circle">${dayData.tasks['d'+i]?'✓':''}</div><span>${t}</span>
                    </div>`).join('')}
                <div style="height:10px"></div>
                ${state.config.ntasks.map((t, i) => `
                    <div class="task-item night-type ${dayData.tasks['n'+i]?'checked':''}" onclick="toggleTask('n${i}')">
                        <div class="check-circle">${dayData.tasks['n'+i]?'✓':''}</div><span>${t}</span>
                    </div>`).join('')}
            </div>
            <div class="task-card" style="background:#FFF5F7; border:2px dashed var(--theme-color)">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
                    <span style="font-weight:900">💖 額外加分</span>
                    <div style="display:flex; align-items:center; gap:10px">
                        <button class="nav-btn" onclick="adjBonus(-1)">-</button>
                        <span id="bonus-val" style="font-weight:900; font-size:18px">${dayData.bonus}</span>
                        <button class="nav-btn" onclick="adjBonus(1)">+</button>
                    </div>
                </div>
                <textarea id="bonus-note-field" class="form-input" style="height:60px" placeholder="加分備註..." oninput="updateNote(this.value)">${dayData.note || ''}</textarea>
            </div>
            <div class="task-card" style="background:#EBF8FF; border:1px solid #BEE3F8">
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <span style="font-weight:900; color:#2B6CB0">🎁 領取獎勵</span>
                    <div style="display:flex; align-items:center; gap:10px">
                        <button class="nav-btn" onclick="adjUsed(-1)">-</button>
                        <span id="used-val" style="font-weight:900; font-size:20px">${dayData.used}</span>
                        <button class="nav-btn" onclick="adjUsed(1)">+</button>
                    </div>
                </div>
            </div>`;
    }
}

function selectChild(id, day) {
    state.activeChild = id; 
    if(day !== undefined) state.activeDay = day;
    switchView('tasks');
}

function switchView(v) {
    document.getElementById('view-dashboard').style.display = v === 'dashboard' ? 'block' : 'none';
    document.getElementById('view-tasks').style.display = v === 'tasks' ? 'block' : 'none';
    document.getElementById('tab-dashboard').classList.toggle('active', v === 'dashboard');
    document.getElementById('tab-tasks').classList.toggle('active', v === 'tasks');
    render();
}

function toggleTask(tid) {
    const wkKey = getWkKey(state.wkOffset);
    const dayData = state.data[`${wkKey}_${state.activeChild}`].days[state.activeDay];
    dayData.tasks[tid] = !dayData.tasks[tid];
    save(); render();
}

function adjBonus(v) {
    const wkKey = getWkKey(state.wkOffset);
    const d = state.data[`${wkKey}_${state.activeChild}`].days[state.activeDay];
    d.bonus = Math.max(0, (d.bonus || 0) + v);
    document.getElementById('bonus-val').innerText = d.bonus;
    save();
}

function adjUsed(v) {
    const wkKey = getWkKey(state.wkOffset);
    const d = state.data[`${wkKey}_${state.activeChild}`].days[state.activeDay];
    d.used = Math.max(0, (d.used || 0) + v);
    document.getElementById('used-val').innerText = d.used;
    save();
}

function updateNote(v) {
    const wkKey = getWkKey(state.wkOffset);
    if (!state.data[`${wkKey}_${state.activeChild}`]) ensureData(wkKey, state.activeChild);
    state.data[`${wkKey}_${state.activeChild}`].days[state.activeDay].note = v;
    save();
}

function changeWk(v) { state.wkOffset += v; render(); }

// 系統與計分設定
function showSettings() {
    const themeList = document.getElementById('theme-options');
    themeList.innerHTML = THEMES.map((t, idx) => `
        <div style="width:30px; height:30px; border-radius:8px; cursor:pointer; background:${t.main}; border:${state.config.themeIndex===idx?'3px solid #4A5568':'none'}" 
             onclick="state.config.themeIndex=${idx}; applyTheme(); showSettings();"></div>`).join('');

    document.getElementById('set-dmode').value = state.config.dMode;
    document.getElementById('set-dscore').value = state.config.dScore;
    document.getElementById('set-nmode').value = state.config.nMode;
    document.getElementById('set-nscore').value = state.config.nScore;
    document.getElementById('set-unit').value = state.config.unit;
    document.getElementById('set-dtasks').value = state.config.dtasks.join('\n');
    document.getElementById('set-ntasks').value = state.config.ntasks.join('\n');

    renderMemberSettings();
    document.getElementById('settings-modal').style.display = 'flex';
}

function renderMemberSettings() {
    const list = document.getElementById('member-settings-list');
    list.innerHTML = state.config.members.map((m, idx) => `
        <div class="member-edit-box" data-idx="${idx}">
            <button style="position:absolute; top:10px; right:10px; border:none; background:none; cursor:pointer" onclick="removeMember(${idx})">🗑️</button>
            <div style="display:flex; gap:10px">
                <input type="text" class="form-input member-name" value="${m.name}">
                <input type="color" class="form-input member-color" style="width:50px; height:40px; padding:2px" value="${m.color}">
            </div>
            <div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:10px">
                ${EMOJIS.map(e => `<span class="emoji-opt" style="cursor:pointer; font-size: 20px; opacity:${m.emoji===e?1:0.3}" onclick="selectMemberEmoji(${idx}, '${e}')">${e}</span>`).join('')}
            </div>
        </div>`).join('');
}

function selectMemberEmoji(idx, e) {
    state.config.members[idx].emoji = e;
    renderMemberSettings();
}

function addNewMember() { 
    state.config.members.push({id:'c'+Date.now(), name:'小寶貝', emoji:'👶🏻', color:'#FBB6CE'}); 
    renderMemberSettings();
}

function removeMember(idx) { 
    if(state.config.members.length > 1) { 
        state.config.members.splice(idx,1); 
        renderMemberSettings(); 
    } 
}

function commitSettings() {
    // 讀取設定值並寫回 state
    state.config.dMode = document.getElementById('set-dmode').value;
    state.config.dScore = Number(document.getElementById('set-dscore').value);
    state.config.nMode = document.getElementById('set-nmode').value;
    state.config.nScore = Number(document.getElementById('set-nscore').value);
    state.config.unit = document.getElementById('set-unit').value;
    state.config.dtasks = document.getElementById('set-dtasks').value.split('\n').filter(l=>l.trim());
    state.config.ntasks = document.getElementById('set-ntasks').value.split('\n').filter(l=>l.trim());
    
    // 成員名字與顏色更新
    const boxes = document.querySelectorAll('.member-edit-box');
    boxes.forEach(box => {
        const idx = box.dataset.idx;
        state.config.members[idx].name = box.querySelector('.member-name').value;
        state.config.members[idx].color = box.querySelector('.member-color').value;
    });

    save();
    document.getElementById('settings-modal').style.display = 'none';
    render();
}

function hideSettings() {
    document.getElementById('settings-modal').style.display = 'none';
    render();
}

load();
</script>
</body>
</html>
